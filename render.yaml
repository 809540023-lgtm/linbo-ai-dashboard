services:
  - type: web
    name: linbo-platform
    runtime: node
    plan: starter
    region: singapore
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://ljlgwwynijqauksljvya.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: INGEST_API_KEY
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false

  # === Cron jobs ===
  # 用 curlimages/curl 輕量 image 觸發 web 上的 API
  # 共用同一個 CRON_SECRET 跟 web service（fromService）
  - type: cron
    name: cron-agent-a
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    region: singapore
    schedule: "0 * * * *"
    autoDeploy: true
    command: curl -fsSL -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL/api/agent-a"
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: linbo-platform
          envVarKey: CRON_SECRET
      - key: SITE_URL
        value: https://linbo.0915888927.com

  - type: cron
    name: cron-agent-b
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    region: singapore
    schedule: "0 * * * *"
    autoDeploy: true
    command: curl -fsSL -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL/api/agent-b"
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: linbo-platform
          envVarKey: CRON_SECRET
      - key: SITE_URL
        value: https://linbo.0915888927.com

  - type: cron
    name: cron-send-reminder
    runtime: image
    image:
      url: docker.io/curlimages/curl:latest
    region: singapore
    schedule: "0 1 * * *"  # 09:00 Asia/Taipei = 01:00 UTC
    autoDeploy: true
    command: curl -fsSL -H "Authorization: Bearer $CRON_SECRET" "$SITE_URL/api/send-reminder"
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: linbo-platform
          envVarKey: CRON_SECRET
      - key: SITE_URL
        value: https://linbo.0915888927.com
